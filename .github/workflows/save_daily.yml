name: 주도테마 일일 저장

on:
  schedule:
    - cron: '40 6 * * 1-5'  # 한국시간 15:40 (UTC+9 = UTC 06:40), 평일만
  workflow_dispatch:  # 수동 실행 버튼도 활성화

jobs:
  save_theme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 gspread google-auth

      - name: 데이터 수집 및 저장
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python save_daily.py
